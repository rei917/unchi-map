<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🚽 うんちマップ</title>

<link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<style>
html, body {
    margin: 0;
    height: 100%;
    font-family: sans-serif;
}

#map {
    height: 100%;
    width: 100%;
}

.topbar {
    position: absolute;
    z-index: 1000;
    top: 10px;
    left: 10px;

    background: white;
    padding: 10px 15px;
    border-radius: 12px;

    box-shadow: 0 2px 8px rgba(0,0,0,.2);
}

.record-btn {
    position: absolute;
    z-index: 1000;

    bottom: 20px;
    left: 50%;

    transform: translateX(-50%);

    border: none;
    border-radius: 999px;

    padding: 15px 25px;

    background: #4CAF50;
    color: white;

    font-size: 18px;
    cursor: pointer;
}

.modal {
    display: none;

    position: fixed;
    inset: 0;

    background: rgba(0,0,0,.5);

    justify-content: center;
    align-items: center;

    z-index: 2000;
}

.modal-content {
    background: white;

    width: 320px;

    padding: 20px;

    border-radius: 12px;
}

textarea {
    width: 100%;
    resize: vertical;
}

select,
button {
    width: 100%;
    margin-top: 10px;
}
</style>
</head>
<body>

<div class="topbar">
    🚽 うんちマップ β
</div>

<div id="map"></div>

<button class="record-btn" onclick="openRecord()">
    🚽 ここで記録する
</button>

<div class="modal" id="modal">
    <div class="modal-content">

        <h3>うんち記録</h3>

        <label>快適度</label>

        <select id="rating">
            <option value="1">★☆☆☆☆</option>
            <option value="2">★★☆☆☆</option>
            <option value="3" selected>★★★☆☆</option>
            <option value="4">★★★★☆</option>
            <option value="5">★★★★★</option>
        </select>

        <br><br>

        <label>コメント</label>

        <textarea
            id="comment"
            rows="4"
            placeholder="感想を書こう"
        ></textarea>

        <button onclick="saveRecord()">
            保存
        </button>

        <button onclick="closeRecord()">
            キャンセル
        </button>

    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map;
let currentLat;
let currentLng;

map = L.map('map');

L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution: '&copy; OpenStreetMap'
    }
).addTo(map);

navigator.geolocation.getCurrentPosition(

    (position) => {

        currentLat = position.coords.latitude;
        currentLng = position.coords.longitude;

        map.setView([currentLat, currentLng], 17);

        L.marker([currentLat, currentLng])
            .addTo(map)
            .bindPopup("📍現在地")
            .openPopup();

        L.circle([currentLat, currentLng], {
            radius: 15
        }).addTo(map);

    },

    () => {

        alert("位置情報が取得できません");

        map.setView([35.681236, 139.767125], 5);

    }

);

function openRecord() {

    if(currentLat == null) {
        alert("現在地取得中...");
        return;
    }

    document.getElementById("modal").style.display = "flex";
}

function closeRecord() {

    document.getElementById("modal").style.display = "none";
}

function saveRecord() {

    const rating =
        document.getElementById("rating").value;

    const comment =
        document.getElementById("comment").value;

    const marker = L.marker([
        currentLat,
        currentLng
    ]).addTo(map);

    marker.bindPopup(`
        <b>🚽 うんち記録</b>
        <br>
        快適度: ${rating}/5
        <br><br>
        ${comment}
    `);

    console.log({
        lat: currentLat,
        lng: currentLng,
        rating,
        comment,
        createdAt: new Date()
    });

    closeRecord();

    document.getElementById("comment").value = "";

    alert("保存しました！");
}

</script>

</body>
</html>
